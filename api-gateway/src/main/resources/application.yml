server:
  port: 8080

jwt:
  access-secret: 7c41b134c9f40a58708c0d7b67ccea40
  refresh-secret: 3b842a72031ec37f34b3a563014bde8c
  access-token-expiry: 900000
  refresh-token-expiry: 2592000000
  prefix: "Bearer "

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1       # ✅ only this needed
        - id: catalog-service-route
          uri: lb://catalog-service
          predicates:
            - Path=/catalog/**
          filters:
            - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.security: DEBUG    # ✅ shows exactly which rule blocks request
    org.springframework.cloud.gateway: DEBUG